<div class="settings-container">
  <h2><i class="bi bi-gear"></i> {{ 'NOTIFICATION_SETTINGS.TITLE' | translate }}</h2>

  <!-- Loading State -->
  <div *ngIf="loading" class="loading-container">
    <div class="spinner"></div>
    <p>{{ 'NOTIFICATION_SETTINGS.LOADING' | translate }}</p>
  </div>

  <!-- Settings Form -->
  <div *ngIf="!loading">
    <!-- ประเภทการแจ้งเตือน -->
    <div class="card">
      <h4>{{ 'NOTIFICATION_SETTINGS.TYPES' | translate }}</h4>
      <label class="switch-row">
        <span>{{ 'NOTIFICATION_SETTINGS.SCANS_COMPLETED' | translate }}</span>
        <label class="switch">
          <input type="checkbox" [(ngModel)]="settings.scans" />
          <span class="slider"></span>
        </label>
      </label>

      <label class="switch-row">
        <span>{{ 'NOTIFICATION_SETTINGS.ISSUES' | translate }}</span>
        <label class="switch">
          <input type="checkbox" [(ngModel)]="settings.issues" />
          <span class="slider"></span>
        </label>
      </label>

      <label class="switch-row">
        <span>{{ 'NOTIFICATION_SETTINGS.SYSTEM_ALERTS' | translate }}</span>
        <label class="switch">
          <input type="checkbox" [(ngModel)]="settings.system" />
          <span class="slider"></span>
        </label>
      </label>

      <label class="switch-row">
        <span>{{ 'NOTIFICATION_SETTINGS.REPORTS_EXPORTS' | translate }}</span>
        <label class="switch">
          <input type="checkbox" [(ngModel)]="settings.reports" />
          <span class="slider"></span>
        </label>
      </label>
    </div>

    <!-- ปุ่ม -->
    <div class="actions">
      <button class="btn primary" (click)="saveSettings()" [disabled]="saving">
        <i class="bi" [ngClass]="saving ? 'bi-hourglass-split' : 'bi-save'"></i>
        {{ (saving ? 'NOTIFICATION_SETTINGS.SAVING' : 'NOTIFICATION_SETTINGS.SAVE') | translate }}
      </button>
      <button class="btn secondary" (click)="resetSettings()" [disabled]="saving">
        <i class="bi bi-arrow-counterclockwise"></i> {{ 'NOTIFICATION_SETTINGS.RESET' | translate }}
      </button>
    </div>
  </div>
</div>
